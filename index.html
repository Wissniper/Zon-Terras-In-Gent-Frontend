<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sun Seeker · Ghent Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        // One-time migration: the old theme palette stored 'dark'/'light'
        // alongside an OS-preference fallback. The new beige light theme
        // and the deterministic-default rule arrived together, so on first
        // visit after the upgrade we clear any stale `theme` value and
        // bump the version. After this runs once, the toggle persists
        // normally and OS preference is permanently ignored.
        if (localStorage.getItem('theme-version') !== '2') {
          localStorage.removeItem('theme');
          localStorage.setItem('theme-version', '2');
        }
        var stored = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', stored === 'dark' ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
